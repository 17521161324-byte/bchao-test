# GitHub Actions - 自动部署到服务器

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 部署到服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd C:/bchao-test
            git pull origin main

            # 后端依赖更新
            cd backend
            pip install -r requirements.txt
            pm2 restart bchao-backend

            # 前端构建
            cd ../frontend
            npm install
            npm run build

            # Nginx 重载
            nginx -s reload
